<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIOT STYLE LUCKY DRAW</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --black: #0a0a0a;
      --dark: #151515;
      --white: #f7f7f2;
      --red: #d81920;
      --red-dark: #8f1116;
      --gray: #d7d7d7;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Impact, 'Arial Black', 'Pretendard', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
    }
    .page {
      position: relative;
      width: min(100%, 1180px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 34px 18px 64px;
      background:
        linear-gradient(135deg, rgba(216,25,32,.12) 0 18%, transparent 18% 100%),
        radial-gradient(circle at 82% 8%, rgba(216,25,32,.28), transparent 18%),
        linear-gradient(180deg, #111 0%, #050505 100%);
      overflow: hidden;
    }
    .slash {
      position: absolute;
      width: 460px;
      height: 86px;
      background: var(--red);
      transform: rotate(-18deg);
      opacity: .9;
      z-index: 0;
    }
    .slash.one { right: -160px; top: 84px; }
    .slash.two { left: -210px; bottom: 120px; background: #fff; opacity: .08; }

    .event-banner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 36% 64%;
      gap: 24px;
      align-items: center;
      margin-bottom: 24px;
      padding: 24px;
      border: 3px solid var(--white);
      background: linear-gradient(135deg, #181818 0%, #090909 72%, #3c080a 100%);
      box-shadow: 12px 12px 0 var(--red);
    }
    .banner-image {
      min-height: 250px;
      border: 3px solid var(--red);
      background:
        radial-gradient(circle at 50% 42%, rgba(216,25,32,.25), transparent 42%),
        #f0eee7;
      display: grid;
      place-items: center;
      color: #111;
      font-size: 94px;
    }
    .banner-copy .eyebrow {
      display: inline-block;
      margin-bottom: 8px;
      padding: 6px 12px;
      background: var(--red);
      color: var(--white);
      font-size: 16px;
      letter-spacing: 1px;
    }
    .banner-copy h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 96px);
      line-height: .86;
      letter-spacing: -2px;
      color: var(--white);
      text-shadow: 5px 5px 0 var(--red);
    }
    .banner-copy p {
      margin: 16px 0 0;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      word-break: keep-all;
    }

    .item-name-area {
      position: relative;
      z-index: 2;
      margin: 0 0 18px;
      padding: 18px;
      border: 3px solid var(--red);
      background: var(--white);
      color: var(--black);
      box-shadow: 8px 8px 0 rgba(216,25,32,.8);
    }
    .item-name-area strong {
      display: block;
      margin-bottom: 14px;
      font-size: 28px;
      letter-spacing: -1px;
    }
    .item-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .item-card {
      border: 2px solid #111;
      background: #fff;
      min-height: 160px;
      padding: 10px;
      display: grid;
      grid-template-rows: 108px auto auto;
      gap: 6px;
      align-items: center;
      text-align: center;
    }
    .item-card img {
      width: 100%;
      height: 108px;
      object-fit: contain;
      background: #eee;
    }
    .item-card .name {
      font-family: 'Pretendard', sans-serif;
      font-weight: 900;
      font-size: 13px;
      word-break: keep-all;
    }
    .item-card .qty {
      display: inline-block;
      justify-self: center;
      padding: 3px 8px;
      background: var(--red);
      color: #fff;
      font-size: 12px;
    }

    .board-wrap {
      position: relative;
      z-index: 2;
      background: #fff;
      border: 4px solid #fff;
      box-shadow: 12px 12px 0 var(--red-dark);
      overflow: hidden;
    }
    .stamp-row {
      display: grid;
      grid-template-columns: repeat(25, 1fr);
      height: 34px;
      background: #111;
    }
    .stamp {
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(255,255,255,.24);
      font-size: 18px;
      color: #fff;
      background: repeating-linear-gradient(135deg, #111 0 8px, #2b2b2b 8px 16px);
    }
    .draw-grid {
      display: grid;
      grid-template-columns: repeat(25, 1fr);
      grid-template-rows: repeat(20, 34px);
      background: #181818;
    }
    .cell {
      position: relative;
      border: 0;
      border-right: 1px solid rgba(255,255,255,.28);
      border-bottom: 1px solid rgba(255,255,255,.28);
      background: #d81920;
      cursor: pointer;
      transition: .12s ease;
      padding: 0;
    }
    .cell::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff 0 12%, #ed4a4f 13% 45%, #9f1217 46% 100%);
      box-shadow: inset -3px -4px 0 rgba(0,0,0,.24), 0 2px 0 rgba(0,0,0,.28);
    }
    .cell:hover::before { filter: brightness(1.25); transform: scale(1.06); }
    .cell.opened {
      background: #111;
      cursor: default;
    }
    .cell.opened::before {
      display: none;
    }
    .cell.opened::after {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      background: #050505;
      border: 1px dashed rgba(255,255,255,.18);
    }

    .admin-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 22px;
      position: relative;
      z-index: 2;
      font-family: 'Pretendard', sans-serif;
    }
    button, input {
      border: 0;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 15px;
      font-family: inherit;
    }
    button {
      color: var(--white);
      background: var(--red);
      box-shadow: 0 5px 0 var(--red-dark);
      cursor: pointer;
    }
    button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--red-dark); }
    input {
      width: 180px;
      color: #111;
      background: #fff;
      outline: none;
    }
    .admin-only { display: none; }
    body.admin .admin-only { display: inline-flex; }
    .notice {
      text-align: center;
      margin-top: 12px;
      font-family: 'Pretendard', sans-serif;
      font-size: 13px;
      opacity: .82;
      position: relative;
      z-index: 2;
    }

    .result-popup {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: none;
      place-items: center;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(4px);
    }
    .result-popup.show { display: grid; animation: fadeIn .18s ease; }
    .result-card {
      width: min(86vw, 430px);
      padding: 26px;
      border: 5px solid #fff;
      background: linear-gradient(180deg, #fff 0%, #e9e9e9 100%);
      color: #111;
      text-align: center;
      box-shadow: 14px 14px 0 var(--red);
      animation: prizePop .28s ease-out;
    }
    .result-card img {
      width: 100%;
      height: 230px;
      object-fit: contain;
      background: #eee;
      border: 2px solid #111;
      margin-bottom: 14px;
    }
    .result-card .label {
      display: inline-block;
      padding: 5px 10px;
      background: var(--red);
      color: #fff;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .result-card h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      word-break: keep-all;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes prizePop {
      from { transform: scale(.78) rotate(-2deg); opacity: 0; }
      to { transform: scale(1) rotate(0); opacity: 1; }
    }

    @media (max-width: 720px) {
      .page { padding: 20px 10px 42px; }
      .event-banner { grid-template-columns: 1fr; text-align: center; padding: 16px; box-shadow: 7px 7px 0 var(--red); }
      .banner-image { min-height: 160px; font-size: 72px; }
      .draw-grid { grid-template-rows: repeat(20, 25px); }
      .stamp-row { height: 26px; }
      .stamp { font-size: 13px; }
      .cell::before { inset: 3px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="slash one"></div>
    <div class="slash two"></div>

    <!-- 상단 이벤트 배너 영역 -->
    <section class="event-banner">
      <div class="banner-image">🎁</div>
      <div class="banner-copy">
        <span class="eyebrow">RIOT STORE EVENT</span>
        <h1>LUCKY<br />DRAW</h1>
        <p>구매 고객 대상 랜덤 뽑기 이벤트입니다. 원하는 알을 직접 선택하면 당첨 아이템이 공개됩니다.</p>
      </div>
    </section>

    <!-- 아이템 명칭/제품 사진 영역 -->
    <section class="item-name-area">
      <strong>ITEM LIST</strong>
      <div class="item-list" id="itemList"></div>
    </section>

    <section class="board-wrap" aria-label="랜덤 뽑기판">
      <div class="stamp-row" id="stampRow"></div>
      <div class="draw-grid" id="drawGrid"></div>
    </section>

    <div class="admin-panel">
      <input id="adminPassword" type="password" placeholder="관리자 비밀번호" />
      <button onclick="loginAdmin()">관리자 로그인</button>
      <button class="admin-only" onclick="adminResetBoard()">관리자 초기화</button>
    </div>

    <p class="notice" id="notice">총 500개의 알 중 원하는 알을 직접 선택해주세요. 새로고침해도 뽑기 현황은 유지됩니다.</p>
  </main>

  <div class="result-popup" id="resultPopup">
    <div class="result-card">
      <span class="label">CONGRATULATIONS</span>
      <img id="resultImage" src="" alt="당첨 아이템 이미지" />
      <h2 id="resultName"></h2>
    </div>
  </div>

  <script>
    const stampRow = document.getElementById('stampRow');
    const drawGrid = document.getElementById('drawGrid');
    const itemList = document.getElementById('itemList');
    const notice = document.getElementById('notice');
    const resultPopup = document.getElementById('resultPopup');
    const resultImage = document.getElementById('resultImage');
    const resultName = document.getElementById('resultName');

    const STORAGE_KEY = 'riotStyleLuckyDrawBoard_v2';
    const ADMIN_PASSWORD = '1234'; // 실제 운영 시 원하는 비밀번호로 변경
    const cols = 25;
    const rows = 20;
    const totalCount = cols * rows; // 500개

    // 1. 여기에서 아이템별 수량과 제품 사진을 미리 지정하세요.
    // quantity의 합계는 반드시 500이 되어야 합니다.
    // image는 실제 GitHub에 올린 이미지 경로로 교체하면 됩니다. 예: './images/item01.png'
    const itemConfig = [
      {
        id: 'item01',
        name: '리그 오브 레전드 한정 컬렉터블',
        quantity: 20,
        image: 'https://placehold.co/400x300/ffffff/d81920?text=ITEM+01'
      },
      {
        id: 'item02',
        name: '우르프 뒤집개 세트',
        quantity: 40,
        image: 'https://placehold.co/400x300/ffffff/d81920?text=ITEM+02'
      },
      {
        id: 'item03',
        name: '솔라리 비치타월',
        quantity: 60,
        image: 'https://placehold.co/400x300/ffffff/d81920?text=ITEM+03'
      },
      {
        id: 'item04',
        name: 'TFT 래빗 미니 피규어',
        quantity: 80,
        image: 'https://placehold.co/400x300/ffffff/d81920?text=ITEM+04'
      },
      {
        id: 'item05',
        name: '포로 미니 인형',
        quantity: 120,
        image: 'https://placehold.co/400x300/ffffff/d81920?text=ITEM+05'
      },
      {
        id: 'item06',
        name: '티모 아크릴 키링',
        quantity: 180,
        image: 'https://placehold.co/400x300/ffffff/d81920?text=ITEM+06'
      }
    ];

    let boardData = [];

    function validateItemQuantity() {
      const sum = itemConfig.reduce((acc, item) => acc + item.quantity, 0);
      if (sum !== totalCount) {
        alert(`아이템 총 수량이 ${totalCount}개가 아닙니다. 현재 수량: ${sum}개`);
      }
    }

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function createNewBoardData() {
      const pool = [];
      itemConfig.forEach(item => {
        for (let i = 0; i < item.quantity; i++) {
          pool.push({ itemId: item.id, opened: false });
        }
      });
      return shuffle(pool);
    }

    function saveBoardData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(boardData));
    }

    function loadBoardData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          boardData = JSON.parse(saved);
          if (boardData.length === totalCount) return;
        } catch (e) {}
      }
      boardData = createNewBoardData();
      saveBoardData();
    }

    function getItemById(id) {
      return itemConfig.find(item => item.id === id);
    }

    function renderItemList() {
      itemList.innerHTML = '';
      itemConfig.forEach(item => {
        const remaining = boardData.filter(cell => cell.itemId === item.id && !cell.opened).length;
        const card = document.createElement('article');
        card.className = 'item-card';
        card.innerHTML = `
          <img src="${item.image}" alt="${item.name}" />
          <div class="name">${item.name}</div>
          <div class="qty">남은 수량 ${remaining} / ${item.quantity}</div>
        `;
        itemList.appendChild(card);
      });
    }

    function renderBoard() {
      stampRow.innerHTML = '';
      drawGrid.innerHTML = '';

      for (let i = 0; i < cols; i++) {
        const stamp = document.createElement('div');
        stamp.className = 'stamp';
        stamp.textContent = 'RIOT';
        stampRow.appendChild(stamp);
      }

      boardData.forEach((data, index) => {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.type = 'button';
        if (data.opened) cell.classList.add('opened');
        cell.addEventListener('click', () => openCell(index));
        drawGrid.appendChild(cell);
      });
      renderItemList();
    }

    function openCell(index) {
      if (boardData[index].opened) return;
      boardData[index].opened = true;
      saveBoardData();

      const item = getItemById(boardData[index].itemId);
      renderBoard();
      showResultPopup(item);
    }

    function showResultPopup(item) {
      resultImage.src = item.image;
      resultImage.alt = item.name;
      resultName.textContent = item.name;
      resultPopup.classList.add('show');

      setTimeout(() => {
        resultPopup.classList.remove('show');
      }, 2200);
    }

    function loginAdmin() {
      const password = document.getElementById('adminPassword').value;
      if (password === ADMIN_PASSWORD) {
        document.body.classList.add('admin');
        notice.textContent = '관리자 모드입니다. 초기화 버튼을 사용할 수 있습니다.';
      } else {
        alert('비밀번호가 올바르지 않습니다.');
      }
    }

    function adminResetBoard() {
      if (!document.body.classList.contains('admin')) return;
      if (!confirm('현재 뽑기 현황을 모두 초기화할까요? 아이템 위치도 다시 랜덤 배치됩니다.')) return;
      boardData = createNewBoardData();
      saveBoardData();
      renderBoard();
      notice.textContent = '관리자가 뽑기판을 초기화했습니다.';
    }

    validateItemQuantity();
    loadBoardData();
    renderBoard();
  </script>
</body>
</html>
