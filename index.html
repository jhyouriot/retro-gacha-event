<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Lucky Draw</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Arial Rounded MT Bold', 'Pretendard', sans-serif;
      background: #101639;
      color: #fff;
      overflow-x: hidden;
    }
    .page {
      position: relative;
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 14px 52px;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 93, 153, .22), transparent 20%),
        radial-gradient(circle at 90% 12%, rgba(255, 196, 67, .2), transparent 18%),
        linear-gradient(135deg, #111739 0%, #161b49 100%);
      overflow: hidden;
    }
    .ribbon {
      position: absolute;
      inset: auto auto -120px -80px;
      width: 420px;
      height: 240px;
      border-radius: 50%;
      border: 28px solid #f5a52f;
      transform: rotate(-22deg);
      opacity: .95;
    }
    .circle {
      position: absolute;
      width: 86px;
      height: 86px;
      border-radius: 999px;
      background: #ef5e9a;
      box-shadow: 18px 18px 0 #a442b7;
      opacity: .95;
    }
    .circle.left { left: -34px; top: 108px; }
    .circle.right { right: -28px; top: 72px; }

    .hero {
      display: grid;
      grid-template-columns: 42% 58%;
      gap: 10px;
      align-items: center;
      position: relative;
      z-index: 1;
      margin-bottom: 18px;
    }
    .mascot {
      min-height: 260px;
      display: flex;
      align-items: end;
      justify-content: center;
      font-size: 120px;
      filter: drop-shadow(0 12px 0 rgba(0,0,0,.2));
    }
    .copy h1 {
      margin: 0 0 2px;
      color: #ffbf3f;
      font-size: clamp(28px, 7vw, 58px);
      line-height: .92;
      letter-spacing: -2px;
      text-shadow: 4px 4px 0 #48256f;
    }
    .copy h2 {
      margin: 0 0 14px;
      color: #ffbf3f;
      font-size: clamp(18px, 4vw, 30px);
      word-break: keep-all;
    }
    .copy p {
      margin: 0 0 12px;
      font-size: 14px;
      line-height: 1.55;
      word-break: keep-all;
    }
    .prizes {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.55;
    }

    .item-name-area {
      position: relative;
      z-index: 2;
      margin: 0 0 10px;
      padding: 12px 14px;
      border: 3px solid #ffbf3f;
      border-radius: 18px;
      background: rgba(20, 22, 60, .86);
      box-shadow: 0 7px 0 rgba(0,0,0,.24);
    }
    .item-name-area strong {
      display: block;
      color: #ffbf3f;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .item-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .item-chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: #ec5e94;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,.35);
    }

    .board-wrap {
      position: relative;
      z-index: 2;
      background: #df5a89;
      border: 3px solid #ff8db2;
      box-shadow: 0 12px 0 rgba(0,0,0,.25);
      overflow: hidden;
    }
    .stamp-row {
      display: grid;
      grid-template-columns: repeat(25, 1fr);
      height: 32px;
      background: repeating-linear-gradient(90deg, #ff9d3f 0 3px, #6d3277 3px 6px);
    }
    .stamp {
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(255,255,255,.45);
      font-size: 21px;
      color: #24315d;
      text-shadow: 1px 1px #ffd25a;
    }
    .draw-grid {
      display: grid;
      grid-template-columns: repeat(25, 1fr);
      grid-template-rows: repeat(12, 38px);
    }
    .cell {
      border: 0;
      border-right: 1px solid rgba(255,255,255,.42);
      border-bottom: 1px solid rgba(255,255,255,.42);
      background: #df5a89;
      cursor: pointer;
      transition: .15s ease;
      padding: 0;
    }
    .cell:hover { background: #f06a9c; }
    .cell.opened {
      background: #ffbd45;
      color: #1d2147;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 900;
      animation: pop .22s ease-out;
    }
    .cell.opened::after { content: attr(data-prize); }
    @keyframes pop {
      from { transform: scale(.8); filter: brightness(1.4); }
      to { transform: scale(1); filter: brightness(1); }
    }
    .actions, .admin-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
      position: relative;
      z-index: 2;
    }
    button, input {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 15px;
      font-family: inherit;
    }
    button {
      color: #1d2147;
      background: #ffbf3f;
      box-shadow: 0 5px 0 #a85c1f;
      cursor: pointer;
    }
    button:active { transform: translateY(3px); box-shadow: 0 2px 0 #a85c1f; }
    input {
      width: 170px;
      color: #1d2147;
      background: #fff;
      outline: none;
    }
    .admin-only { display: none; }
    body.admin .admin-only { display: inline-flex; }
    .notice {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      opacity: .85;
      position: relative;
      z-index: 2;
    }
    @media (max-width: 560px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .mascot { min-height: 150px; font-size: 96px; }
      .copy ul { text-align: left; display: inline-block; }
      .draw-grid { grid-template-rows: repeat(12, 30px); }
      .stamp-row { height: 26px; }
      .stamp { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="circle left"></div>
    <div class="circle right"></div>
    <div class="ribbon"></div>

    <!-- 상단 이벤트 배너 영역 -->
    <section class="hero">
      <div class="mascot">🐧</div>
      <div class="copy">
        <h2>라이엇 스토어 구매 이벤트!</h2>
        <h1>EVENT</h1>
        <p>라이엇 스토어에서 5만원 이상 구매 시<br />아래 사은품 중 랜덤으로 선물이 증정됩니다!</p>
        <ul class="prizes">
          <li>한정판 컬렉터블</li>
          <li>무드등 / 피규어 / 키링</li>
          <li>티모 인형 & 손목밴드</li>
          <li>스페셜 랜덤 굿즈</li>
        </ul>
      </div>
    </section>

    <!-- 아이템 명칭 영역 -->
    <section class="item-name-area">
      <strong>ITEM LIST</strong>
      <div class="item-list">
        <span class="item-chip">리그 오브 레전드 호랑이해 컬렉터블</span>
        <span class="item-chip">우르프 뒤집개 세트</span>
        <span class="item-chip">솔라리 비치타월</span>
        <span class="item-chip">TFT 래빗 미니 피규어</span>
        <span class="item-chip">포로 미니 인형</span>
        <span class="item-chip">티모 아크릴 키링</span>
      </div>
    </section>

    <section class="board-wrap" aria-label="랜덤 뽑기판">
      <div class="stamp-row" id="stampRow"></div>
      <div class="draw-grid" id="drawGrid"></div>
    </section>

    <div class="actions">
      <button onclick="randomOpen()">랜덤 뽑기</button>
    </div>

    <div class="admin-panel">
      <input id="adminPassword" type="password" placeholder="관리자 비밀번호" />
      <button onclick="loginAdmin()">관리자 로그인</button>
      <button class="admin-only" onclick="adminResetBoard()">관리자 초기화</button>
    </div>

    <p class="notice" id="notice">새로고침해도 뽑기 현황은 유지됩니다.</p>
  </main>

  <script>
    const stampRow = document.getElementById('stampRow');
    const drawGrid = document.getElementById('drawGrid');
    const notice = document.getElementById('notice');

    const STORAGE_KEY = 'retroLuckyDrawBoard_v1';
    const ADMIN_PASSWORD = '1234'; // 실제 운영 시 원하는 비밀번호로 변경
    const cols = 25;
    const rows = 12;
    const prizes = ['🎁', '⭐', '💎', '🐧', '🎀', '5'];

    let boardData = [];

    function createNewBoardData() {
      return Array.from({ length: cols * rows }, () => ({
        prize: prizes[Math.floor(Math.random() * prizes.length)],
        opened: false
      }));
    }

    function saveBoardData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(boardData));
    }

    function loadBoardData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          boardData = JSON.parse(saved);
          if (boardData.length === cols * rows) return;
        } catch (e) {}
      }
      boardData = createNewBoardData();
      saveBoardData();
    }

    function renderBoard() {
      stampRow.innerHTML = '';
      drawGrid.innerHTML = '';

      for (let i = 0; i < cols; i++) {
        const stamp = document.createElement('div');
        stamp.className = 'stamp';
        stamp.textContent = i % 3 === 0 ? '5' : '🌽';
        stampRow.appendChild(stamp);
      }

      boardData.forEach((data, index) => {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.type = 'button';
        cell.dataset.prize = data.prize;
        if (data.opened) cell.classList.add('opened');
        cell.addEventListener('click', () => openCell(index));
        drawGrid.appendChild(cell);
      });
    }

    function openCell(index) {
      if (boardData[index].opened) return;
      boardData[index].opened = true;
      saveBoardData();
      renderBoard();
    }

    function randomOpen() {
      const closedIndexes = boardData
        .map((cell, index) => cell.opened ? null : index)
        .filter(index => index !== null);
      if (!closedIndexes.length) return;
      const randomIndex = closedIndexes[Math.floor(Math.random() * closedIndexes.length)];
      openCell(randomIndex);
    }

    function loginAdmin() {
      const password = document.getElementById('adminPassword').value;
      if (password === ADMIN_PASSWORD) {
        document.body.classList.add('admin');
        notice.textContent = '관리자 모드입니다. 초기화 버튼을 사용할 수 있습니다.';
      } else {
        alert('비밀번호가 올바르지 않습니다.');
      }
    }

    function adminResetBoard() {
      if (!document.body.classList.contains('admin')) return;
      if (!confirm('현재 뽑기 현황을 모두 초기화할까요?')) return;
      boardData = createNewBoardData();
      saveBoardData();
      renderBoard();
      notice.textContent = '관리자가 뽑기판을 초기화했습니다.';
    }

    loadBoardData();
    renderBoard();
  </script>
</body>
</html>
